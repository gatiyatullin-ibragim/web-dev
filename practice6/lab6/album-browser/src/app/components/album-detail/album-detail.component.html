<div class="detail-page">

  <!-- Loading -->
  <div class="loading-wrapper" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading album...</p>
  </div>

  <!-- Error -->
  <div class="error-card" *ngIf="error">
    <span>⚠️</span><p>{{ error }}</p>
  </div>

  <!-- Content -->
  <div class="detail-card" *ngIf="!loading && album">

    <div class="card-header">
      <button class="btn-back" (click)="goBack()">← Back to Albums</button>
      <span class="album-badge">Album #{{ album.id }}</span>
    </div>

    <h1 class="album-title-display">{{ album.title | titlecase }}</h1>

    <div class="meta-row">
      <div class="meta-item">
        <span class="meta-label">Album ID</span>
        <span class="meta-value">{{ album.id }}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">User ID</span>
        <span class="meta-value">{{ album.userId }}</span>
      </div>
    </div>

    <div class="edit-section">
      <h2>✏️ Edit Album Title</h2>
      <div class="edit-row">
        <input
          type="text"
          [(ngModel)]="editTitle"
          class="title-input"
          placeholder="Enter new album title"
        />
        <button
          class="btn-save"
          (click)="saveTitle()"
          [disabled]="saving || !editTitle.trim()"
        >
          {{ saving ? 'Saving...' : 'Save' }}
        </button>
      </div>
      <div class="save-success" *ngIf="saveSuccess">
        ✅ Title updated successfully!
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-photos" (click)="viewPhotos()">
        🖼️ View Photos
      </button>
    </div>
  </div>
</div>
